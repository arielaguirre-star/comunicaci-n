<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TecnoBot - Evolución de las Comunicaciones</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: #0a0a0c;
            color: #e0e0e0;
            background-image: 
                linear-gradient(rgba(10, 10, 12, 0.9), rgba(10, 10, 12, 0.9)),
                url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(20, 20, 25, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 20px;
            box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.8);
        }
        .neon-text {
            color: #00f2ff;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.6);
            font-family: 'Orbitron', sans-serif;
        }
        .step-active {
            border: 2px solid #00f2ff;
            background: rgba(0, 242, 255, 0.1);
        }
        .step-locked {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(1);
        }
        textarea {
            background: rgba(0, 0, 0, 0.4) !important;
            border: 1px solid rgba(0, 242, 255, 0.3) !important;
            color: #00f2ff !important;
            resize: none;
        }
        .btn-neon {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            font-family: 'Orbitron', sans-serif;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="app" class="max-w-5xl mx-auto">
        <!-- HEADER -->
        <header class="text-center mb-8">
            <h1 class="text-4xl md:text-6xl neon-text mb-2 uppercase">Tecno-Bot 2.0</h1>
            <p class="text-cyan-500 font-medium tracking-widest uppercase">Misión: Evolución de las Comunicaciones</p>
        </header>

        <!-- PANTALLA DE INGRESO -->
        <div id="login-screen" class="glass-card p-10 max-w-lg mx-auto">
            <h2 class="text-3xl neon-text text-center mb-8 uppercase">Acceso Cadete</h2>
            <div class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="nombre" placeholder="Nombre" class="w-full p-4 rounded-lg bg-black/40 border border-cyan-500/30">
                    <input type="text" id="apellido" placeholder="Apellido" class="w-full p-4 rounded-lg bg-black/40 border border-cyan-500/30">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <select id="curso" class="p-4 rounded-lg bg-black/40 border border-cyan-500/30">
                        <option value="" disabled selected>Curso</option>
                        <option value="2-1">2° 1</option><option value="2-2">2° 2</option>
                        <option value="2-3">2° 3</option><option value="2-4">2° 4</option>
                    </select>
                    <select id="turno" class="p-4 rounded-lg bg-black/40 border border-cyan-500/30">
                        <option value="" disabled selected>Turno</option>
                        <option value="TM">T. Mañana</option><option value="TT">T. Tarde</option>
                    </select>
                </div>
                <button onclick="startApp()" class="w-full btn-neon p-5 rounded-xl mt-6 text-xl font-bold uppercase">Iniciar Protocolo</button>
            </div>
            <button onclick="showAdminPrompt()" class="w-full mt-10 text-xs text-gray-500 hover:text-cyan-400">MODO SUPERVISOR (DOCENTE)</button>
        </div>

        <!-- PANTALLA PRINCIPAL -->
        <div id="main-content" class="hidden">
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 glass-card p-4 px-8 text-white font-bold">
                <div id="user-info"></div>
                <div class="flex items-center space-x-4">
                    <div id="progress-val" class="text-2xl neon-text">0%</div>
                    <div class="w-32 bg-gray-800 rounded-full h-3">
                        <div id="progress-bar-fill" class="bg-cyan-500 h-3 rounded-full transition-all" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <button onclick="showEtapa(1)" id="btn-e1" class="glass-card p-6 text-center font-bold">FASE 01</button>
                <button onclick="showEtapa(2)" id="btn-e2" class="glass-card p-6 text-center step-locked font-bold">FASE 02</button>
                <button onclick="showEtapa(3)" id="btn-e3" class="glass-card p-6 text-center step-locked font-bold">FASE 03</button>
                <button onclick="showEtapa(4)" id="btn-e4" class="glass-card p-6 text-center step-locked font-bold">FASE 04</button>
            </div>

            <div id="etapa-content" class="glass-card p-8 min-h-[400px]"></div>
            <div class="mt-8 flex justify-between items-center">
                <div id="status-cloud" class="text-xs italic text-gray-500">Conectando...</div>
                <button onclick="location.reload()" class="text-gray-500 underline text-sm">Cerrar Sesión</button>
            </div>
        </div>

        <!-- PANEL DOCENTE -->
        <div id="admin-panel" class="hidden glass-card p-8">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-3xl neon-text uppercase">Control Docente</h2>
                    <p class="text-gray-500 text-sm">Monitoreo de tareas por Curso y Turno</p>
                </div>
                <button onclick="location.reload()" class="bg-red-900/40 px-6 py-2 rounded-lg border border-red-500 text-sm">SALIR</button>
            </div>
            <div id="admin-data" class="space-y-8"></div>
        </div>
    </div>

    <!-- MODAL PASS -->
    <div id="admin-modal" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-4 z-50">
        <div class="glass-card p-10 max-w-sm w-full text-center border border-cyan-500">
            <h3 class="neon-text mb-6 uppercase">Clave Docente</h3>
            <input type="password" id="admin-pass" class="w-full p-4 mb-6 rounded-lg text-center text-2xl bg-black border border-cyan-900" maxlength="4">
            <button onclick="checkAdmin()" class="w-full btn-neon p-4 rounded-xl font-bold uppercase">Entrar</button>
            <button onclick="closeAdminModal()" class="mt-4 text-xs text-gray-500">Cancelar</button>
        </div>
    </div>

    <!-- FIREBASE SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        
        // 1. AQUÍ CAMBIAS TUS DATOS DE FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBOMox9B7qbrgNoft43o5AepZLw-XnJINY", // El entorno lo proporciona automáticamente
            authDomain: "comunicacion-a3d7b.firebaseapp.com",
            projectId: "comunicacion-a3d7b",
            storageBucket: "comunicacion-a3d7b.firebasestorage.app",
            messagingSenderId: "89118114508",
            appId: "1:89118114508:web:7da3a314fec43bb2d23869"
        };

       const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'tecnobot-v1';

        window.currentUser = null;
        window.allStudents = [];

        onAuthStateChanged(auth, (user) => { if (!user) signInAnonymously(auth); });

        window.startApp = async () => {
            const nombre = document.getElementById('nombre').value.trim();
            const apellido = document.getElementById('apellido').value.trim();
            const curso = document.getElementById('curso').value;
            const turno = document.getElementById('turno').value;

            if (!nombre || !apellido || !curso || !turno) return alert("Complete todos los campos");

            const studentId = `${curso}-${turno}-${apellido}-${nombre}`.toLowerCase().replace(/\s/g, '');
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'alumnos', studentId);
            
            const snap = await getDoc(docRef);
            if (snap.exists()) {
                window.currentUser = snap.data();
            } else {
                window.currentUser = {
                    id: studentId, nombre, apellido, curso, turno,
                    respuestas: { e1: '', e2: '', e3: '', e4: '' },
                    progreso: 0, calificacion: 'Pendiente'
                };
                await setDoc(docRef, window.currentUser);
            }

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('user-info').innerHTML = `CADETE: ${window.currentUser.apellido}, ${window.currentUser.nombre} | ${window.currentUser.curso} [${window.currentUser.turno}]`;
            window.showEtapa(1);
            window.calculateProgress();
            document.getElementById('status-cloud').innerText = "✓ Conectado a la Nube";
        };

        window.updateLocalResp = async (key, val) => {
            window.currentUser.respuestas[key] = val;
            window.calculateProgress();
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'alumnos', window.currentUser.id);
            await setDoc(docRef, window.currentUser, { merge: true });
        };

        window.listenAllStudents = () => {
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'alumnos');
            onSnapshot(q, (snapshot) => {
                window.allStudents = snapshot.docs.map(doc => doc.data());
                window.renderAdminData();
            });
        };

        window.updateGrade = async (id, val) => {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'alumnos', id);
            await setDoc(docRef, { calificacion: val }, { merge: true });
        };
    </script>

    <script>
        const etapasConfig = {
            1: { 
                title: "ETAPA 1: ARQUEOLOGÍA E IDENTIFICACIÓN", 
                desc: "Investiga 4 hitos históricos. Usa a tu Agente IA para saber qué necesidad los creó y cómo cambiaron el mundo.",
                consigna: "En tu carpeta: Crea una tabla con 4 inventos detallando Necesidad, Componentes e Impacto Social. Aquí, resume tu investigación:",
                id: 'e1' 
            },
            2: { 
                title: "ETAPA 2: ANÁLISIS DE SISTEMAS", 
                desc: "Diagramación lógica. Compara el Telégrafo vs WhatsApp con tu Agente.",
                consigna: "En tu carpeta: Dibuja los diagramas. Aquí, explica qué bloques representan el 'ruido' y cómo cambió el codificador del pasado al presente:",
                id: 'e2' 
            },
            3: { 
                title: "ETAPA 3: ÉTICA Y SUSTENTABILIDAD", 
                desc: "Análisis FODA. Reflexiona sobre el impacto ambiental de los celulares.",
                consigna: "Aquí escribe tu análisis FODA (Fortalezas, Oportunidades, Debilidades, Amenazas) y tu conclusión sobre el impacto ambiental:",
                id: 'e3' 
            },
            4: { 
                title: "ETAPA 4: EL RETO FINAL", 
                desc: "Diseña un sistema de comunicación sin electricidad.",
                consigna: "Describe tu invento, cómo funciona y qué nota te puso tu Agente Profesor tras evaluarlo:",
                id: 'e4' 
            }
        };

        function showEtapa(n) {
            if (n > 1 && (window.currentUser.respuestas[`e${n-1}`] || "").length < 30) {
                return alert("⚠️ Fase bloqueada. Debes completar al menos 30 caracteres en la fase anterior.");
            }

            const config = etapasConfig[n];
            const container = document.getElementById('etapa-content');
            
            [1,2,3,4].forEach(i => {
                const btn = document.getElementById(`btn-e${i}`);
                btn.classList.remove('step-active');
                if (i === 1 || (window.currentUser.respuestas[`e${i-1}`] && window.currentUser.respuestas[`e${i-1}`].length >= 30)) {
                    btn.classList.remove('step-locked');
                }
            });
            document.getElementById(`btn-e${n}`).classList.add('step-active');

            container.innerHTML = `
                <h3 class="text-2xl neon-text mb-1 uppercase font-bold">${config.title}</h3>
                <p class="mb-4 text-cyan-400 text-sm font-bold uppercase tracking-wider">${config.desc}</p>
                <p class="mb-4 text-gray-300 text-sm italic">${config.consigna}</p>
                <textarea 
                    class="w-full h-72 p-6 rounded-xl font-mono text-sm leading-relaxed" 
                    placeholder="Escribe tu trabajo aquí..."
                    oninput="updateLocalResp('${config.id}', this.value)">${window.currentUser.respuestas[config.id] || ''}</textarea>
            `;
        }

        function calculateProgress() {
            let filled = 0;
            const res = window.currentUser.respuestas;
            if ((res.e1 || "").length >= 30) filled++;
            if ((res.e2 || "").length >= 30) filled++;
            if ((res.e3 || "").length >= 30) filled++;
            if ((res.e4 || "").length >= 30) filled++;
            
            window.currentUser.progreso = Math.round((filled / 4) * 100);
            document.getElementById('progress-val').innerText = `${window.currentUser.progreso}%`;
            document.getElementById('progress-bar-fill').style.width = `${window.currentUser.progreso}%`;
        }

        function showAdminPrompt() { document.getElementById('admin-modal').classList.remove('hidden'); }
        function closeAdminModal() { document.getElementById('admin-modal').classList.add('hidden'); }
        
        function checkAdmin() {
            if (document.getElementById('admin-pass').value === '1304') {
                closeAdminModal();
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                window.listenAllStudents(); 
            } else { alert("Error de frecuencia"); }
        }

        function renderAdminData() {
            const container = document.getElementById('admin-data');
            const cursos = ['2-1', '2-2', '2-3', '2-4'];
            const turnos = ['TM', 'TT'];
            let html = "";

            cursos.forEach(c => {
                turnos.forEach(t => {
                    const alumnos = window.allStudents.filter(u => u.curso === c && u.turno === t);
                    if (alumnos.length > 0) {
                        html += `
                        <div class="glass-card p-6 border-l-4 border-cyan-500">
                            <h3 class="text-xl neon-text mb-4 uppercase">CURSO: ${c} | TURNO: ${t === 'TM' ? 'MAÑANA' : 'TARDE'}</h3>
                            <table class="w-full text-left text-xs">
                                <thead class="text-cyan-600 border-b border-gray-800 uppercase">
                                    <tr>
                                        <th class="p-2">Apellido y Nombre</th>
                                        <th class="p-2 text-center">Avance</th>
                                        <th class="p-2 text-center">Nota</th>
                                        <th class="p-2 text-right">Detalles</th>
                                    </tr>
                                </thead>
                                <tbody>`;
                        alumnos.sort((a,b) => a.apellido.localeCompare(b.apellido)).forEach(u => {
                            html += `
                                <tr class="border-b border-gray-900/50 hover:bg-cyan-900/10">
                                    <td class="p-2 font-bold">${u.apellido.toUpperCase()}, ${u.nombre}</td>
                                    <td class="p-2 text-center text-cyan-400 font-bold">${u.progreso}%</td>
                                    <td class="p-2">
                                        <input type="text" class="bg-black border border-gray-800 w-full text-center text-green-400 font-bold py-1 rounded" 
                                               value="${u.calificacion}" onchange="updateGrade('${u.id}', this.value)">
                                    </td>
                                    <td class="p-2 text-right">
                                        <button onclick="verDetalles('${u.id}')" class="bg-cyan-900/40 p-1 px-3 rounded hover:bg-cyan-500 hover:text-black transition-all">VER</button>
                                    </td>
                                </tr>`;
                        });
                        html += `</tbody></table></div>`;
                    }
                });
            });
            container.innerHTML = html || "<p class='text-center py-10 text-gray-500 italic'>No hay alumnos conectados aún...</p>";
        }

        window.verDetalles = (id) => {
            const u = window.allStudents.find(user => user.id === id);
            const win = window.open("", "Reporte", "width=600,height=700");
            win.document.write(`
                <body style="background:#0a0a0c; color:#00f2ff; font-family: sans-serif; padding:30px;">
                    <h2 style="border-bottom: 2px solid #00f2ff; padding-bottom:10px;">EXPEDIENTE: ${u.apellido.toUpperCase()}, ${u.nombre}</h2>
                    <p style="color:#aaa;"><b>CURSO:</b> ${u.curso} | <b>TURNO:</b> ${u.turno}</p>
                    <div style="background:#1a1a1f; padding:20px; border-radius:10px; margin-top:20px; border: 1px solid #333;">
                        <p><b>ETAPA 1 (Arqueología):</b><br><span style="color:#eee;">${u.respuestas.e1 || 'Sin completar'}</span></p><hr style="border-color:#333;">
                        <p><b>ETAPA 2 (Sistemas):</b><br><span style="color:#eee;">${u.respuestas.e2 || 'Sin completar'}</span></p><hr style="border-color:#333;">
                        <p><b>ETAPA 3 (Ética):</b><br><span style="color:#eee;">${u.respuestas.e3 || 'Sin completar'}</span></p><hr style="border-color:#333;">
                        <p><b>ETAPA 4 (Reto Final):</b><br><span style="color:#eee;">${u.respuestas.e4 || 'Sin completar'}</span></p>
                    </div>
                </body>
            `);
        };
    </script>
</body>
</html>
