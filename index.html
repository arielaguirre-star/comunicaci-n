<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TecnoBot - Evolución de las Comunicaciones</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: #0a0a0c;
            color: #e0e0e0;
            /* Fondo con temática de informática/tecnología */
            background-image: 
                linear-gradient(rgba(10, 10, 12, 0.9), rgba(10, 10, 12, 0.9)),
                url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(20, 20, 25, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 20px;
            box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.8);
        }

        .neon-text {
            color: #00f2ff;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.6);
            font-family: 'Orbitron', sans-serif;
        }

        .step-active {
            border: 2px solid #00f2ff;
            background: rgba(0, 242, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        .step-locked {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        input, select, textarea {
            background: rgba(0, 0, 0, 0.4) !important;
            border: 1px solid rgba(0, 242, 255, 0.3) !important;
            color: #00f2ff !important;
            transition: all 0.3s;
        }

        input:focus, textarea:focus {
            border-color: #00f2ff !important;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.4);
            outline: none;
        }

        .btn-neon {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Orbitron', sans-serif;
        }

        .btn-neon:hover:not(:disabled) {
            box-shadow: 0 0 25px rgba(0, 198, 255, 0.8);
            transform: scale(1.02);
        }

        .btn-neon:disabled {
            background: #444;
            cursor: not-allowed;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0c; }
        ::-webkit-scrollbar-thumb { background: #00f2ff; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="app" class="max-w-5xl mx-auto">
        <!-- HEADER -->
        <header class="text-center mb-8">
            <h1 class="text-4xl md:text-6xl neon-text mb-2">TECNO-BOT 2.0</h1>
            <p class="text-cyan-500 font-medium tracking-widest uppercase">Misión: Evolución de las Comunicaciones</p>
        </header>

        <!-- PANTALLA DE INGRESO -->
        <div id="login-screen" class="glass-card p-10 max-w-lg mx-auto transform transition-all">
            <div class="text-center mb-8">
                <div class="inline-block p-4 rounded-full bg-cyan-900/30 mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </div>
                <h2 class="text-3xl neon-text">ACCESO CADETE</h2>
            </div>
            
            <div class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="nombre" placeholder="Nombre" class="w-full p-4 rounded-lg">
                    <input type="text" id="apellido" placeholder="Apellido" class="w-full p-4 rounded-lg">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <select id="curso" class="p-4 rounded-lg">
                        <option value="" disabled selected>Curso</option>
                        <option value="2-1">2° 1</option>
                        <option value="2-2">2° 2</option>
                        <option value="2-3">2° 3</option>
                        <option value="2-4">2° 4</option>
                    </select>
                    <select id="turno" class="p-4 rounded-lg">
                        <option value="" disabled selected>Turno</option>
                        <option value="TM">T. Mañana</option>
                        <option value="TT">T. Tarde</option>
                    </select>
                </div>
                <button onclick="startApp()" class="w-full btn-neon p-5 rounded-xl mt-6 text-xl">Iniciar Protocolo</button>
            </div>
            <button onclick="showAdminPrompt()" class="w-full mt-10 text-xs text-gray-500 hover:text-cyan-400 transition-colors">MODO SUPERVISOR (DOCENTE)</button>
        </div>

        <!-- PANTALLA PRINCIPAL DE ETAPAS -->
        <div id="main-content" class="hidden animate-fade-in">
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 glass-card p-4 px-8">
                <div id="user-info" class="text-xl text-white font-bold"></div>
                <div class="flex items-center space-x-4">
                    <div class="text-right">
                        <div class="text-xs text-cyan-500 uppercase font-bold">Sincronización</div>
                        <div id="progress-val" class="text-2xl neon-text">0%</div>
                    </div>
                    <div class="w-32 bg-gray-800 rounded-full h-3">
                        <div id="progress-bar-fill" class="bg-cyan-500 h-3 rounded-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <button onclick="showEtapa(1)" id="btn-e1" class="glass-card p-6 text-center transition-all duration-300">
                    <span class="block text-xs text-gray-500 mb-1">FASE 01</span>
                    <span class="font-bold">ARQUEOLOGÍA</span>
                </button>
                <button onclick="showEtapa(2)" id="btn-e2" class="glass-card p-6 text-center transition-all duration-300 step-locked">
                    <span class="block text-xs text-gray-500 mb-1">FASE 02</span>
                    <span class="font-bold">SISTEMAS</span>
                </button>
                <button onclick="showEtapa(3)" id="btn-e3" class="glass-card p-6 text-center transition-all duration-300 step-locked">
                    <span class="block text-xs text-gray-500 mb-1">FASE 03</span>
                    <span class="font-bold">ÉTICA</span>
                </button>
                <button onclick="showEtapa(4)" id="btn-e4" class="glass-card p-6 text-center transition-all duration-300 step-locked">
                    <span class="block text-xs text-gray-500 mb-1">FASE 04</span>
                    <span class="font-bold">RETO FINAL</span>
                </button>
            </div>

            <!-- CONTENIDO DE ETAPAS -->
            <div id="etapa-content" class="glass-card p-8 min-h-[450px] relative overflow-hidden">
                <!-- Cargado dinámicamente -->
            </div>

            <div class="mt-8 flex flex-col md:flex-row gap-4 justify-between">
                <button onclick="saveProgress()" class="bg-cyan-600 hover:bg-cyan-500 px-8 py-3 rounded-xl font-bold transition-colors">SUBIR DATOS A LA NUBE</button>
                <button onclick="logout()" class="text-gray-500 hover:text-white transition-colors underline decoration-dotted">Finalizar Sesión</button>
            </div>
        </div>

        <!-- PANEL DOCENTE -->
        <div id="admin-panel" class="hidden glass-card p-8 animate-fade-in">
            <div class="flex justify-between items-center mb-8 border-b border-cyan-900 pb-4">
                <div>
                    <h2 class="text-3xl neon-text">CENTRO DE CONTROL</h2>
                    <p class="text-gray-400">Monitoreo de Cadetes en Tiempo Real</p>
                </div>
                <button onclick="hideAdmin()" class="bg-red-900/40 hover:bg-red-700 text-red-200 px-6 py-2 rounded-lg border border-red-500 transition-colors">DESCONECTAR</button>
            </div>
            
            <div id="admin-data" class="space-y-8">
                <!-- Contenido dinámico filtrado por curso -->
            </div>
        </div>
    </div>

    <!-- MODAL DOCENTE -->
    <div id="admin-modal" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-4 z-50">
        <div class="glass-card p-10 max-w-sm w-full text-center border-2 border-cyan-500">
            <h3 class="text-2xl neon-text mb-6">AUTENTICACIÓN</h3>
            <p class="text-gray-400 mb-4 text-sm">Ingrese frecuencia de acceso docente:</p>
            <input type="password" id="admin-pass" class="w-full p-4 mb-6 rounded-lg text-center text-2xl tracking-[1em]" maxlength="4">
            <div class="flex flex-col gap-2">
                <button onclick="checkAdmin()" class="w-full btn-neon p-4 rounded-xl">VALIDAR</button>
                <button onclick="closeAdminModal()" class="text-gray-500 hover:text-white p-2">Abortar</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let db = JSON.parse(localStorage.getItem('tecno_db_v2')) || [];
        let currentStep = 1;

        const etapasConfig = {
            1: {
                title: "ETAPA 1: ARQUEOLOGÍA E IDENTIFICACIÓN",
                desc: "Usa a tu Agente IA para investigar 4 hitos históricos. ¿Qué necesidad los creó y cómo cambiaron el mundo?",
                fields: [
                    { id: 'e1_hitos', label: 'Registro de Investigación (Hitos y Análisis):', type: 'textarea', placeholder: 'Escribe aquí tu análisis... (mínimo 50 caracteres)' }
                ]
            },
            2: {
                title: "ETAPA 2: ANÁLISIS DE SISTEMAS",
                desc: "Diagramación lógica. Compara la estructura del Telégrafo frente a WhatsApp con tu Agente.",
                fields: [
                    { id: 'e2_diagrama', label: 'Descripción de Bloques y Comparativa:', type: 'textarea', placeholder: 'Explica los bloques identificados...' }
                ]
            },
            3: {
                title: "ETAPA 3: ÉTICA Y SUSTENTABILIDAD",
                desc: "Análisis FODA. Reflexiona con tu Agente sobre el impacto ambiental de la tecnología móvil.",
                fields: [
                    { id: 'e3_foda', label: 'Análisis FODA y Conclusión Ambiental:', type: 'textarea', placeholder: 'Fortalezas, Oportunidades...' }
                ]
            },
            4: {
                title: "ETAPA 4: EL RETO FINAL",
                desc: "Diseña un sistema de comunicación sin electricidad y somételo a la evaluación de tu Agente IA.",
                fields: [
                    { id: 'e4_reto', label: 'Tu Propuesta Técnica y Evaluación de la IA:', type: 'textarea', placeholder: 'Describe tu invento y qué nota te puso tu Agente...' }
                ]
            }
        };

        function startApp() {
            const nombre = document.getElementById('nombre').value.trim();
            const apellido = document.getElementById('apellido').value.trim();
            const curso = document.getElementById('curso').value;
            const turno = document.getElementById('turno').value;

            if (!nombre || !apellido || !curso || !turno) {
                showToast("Complete todos los campos de acceso");
                return;
            }

            // REGLA: Borrar entrada anterior si ya existía para permitir reinicio
            db = db.filter(u => !(u.nombre.toLowerCase() === nombre.toLowerCase() && u.apellido.toLowerCase() === apellido.toLowerCase() && u.curso === curso));
            
            currentUser = {
                id: Date.now(),
                nombre,
                apellido,
                curso,
                turno,
                respuestas: { e1: '', e2: '', e3: '', e4: '' },
                calificacion: 'Pendiente',
                progreso: 0
            };

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('user-info').innerHTML = `CADETE: <span class="neon-text">${apellido.toUpperCase()}, ${nombre.toUpperCase()}</span> | ${curso} [${turno}]`;
            
            showEtapa(1);
        }

        function showEtapa(n) {
            // Regla: No puede avanzar si la anterior no tiene contenido suficiente
            if (n > 1) {
                const prevResp = currentUser.respuestas[`e${n-1}`] || "";
                if (prevResp.length < 30) {
                    showToast(`Bloqueado: Debes completar la Etapa ${n-1} para avanzar.`);
                    return;
                }
            }

            currentStep = n;
            const config = etapasConfig[n];
            const container = document.getElementById('etapa-content');
            
            // Actualizar botones de navegación
            [1,2,3,4].forEach(i => {
                const btn = document.getElementById(`btn-e${i}`);
                btn.classList.remove('step-active');
                
                // Desbloquear visualmente según progreso
                if (i === 1 || (currentUser.respuestas[`e${i-1}`] && currentUser.respuestas[`e${i-1}`].length >= 30)) {
                    btn.classList.remove('step-locked');
                } else {
                    btn.classList.add('step-locked');
                }
            });
            document.getElementById(`btn-e${n}`).classList.add('step-active');

            let html = `
                <div class="animate-fade-in">
                    <h3 class="text-3xl neon-text mb-2 tracking-tighter">${config.title}</h3>
                    <p class="mb-8 text-gray-400 italic">${config.desc}</p>
            `;
            
            config.fields.forEach(f => {
                const val = currentUser.respuestas[`e${n}`] || '';
                html += `
                    <div class="mb-4">
                        <label class="block mb-3 text-cyan-400 font-bold uppercase text-sm tracking-widest">${f.label}</label>
                        <textarea 
                            id="${f.id}" 
                            placeholder="${f.placeholder}"
                            class="w-full h-64 p-6 rounded-xl font-mono text-sm leading-relaxed" 
                            oninput="updateLocalResp(${n}, this.value)">${val}</textarea>
                    </div>
                `;
            });

            html += `</div>`;
            container.innerHTML = html;
        }

        function updateLocalResp(etapa, val) {
            currentUser.respuestas[`e${etapa}`] = val;
            calculateProgress();
        }

        function calculateProgress() {
            let filledCount = 0;
            const threshold = 30; // caracteres mínimos

            if (currentUser.respuestas.e1.length >= threshold) filledCount++;
            if (currentUser.respuestas.e2.length >= threshold) filledCount++;
            if (currentUser.respuestas.e3.length >= threshold) filledCount++;
            if (currentUser.respuestas.e4.length >= threshold) filledCount++;
            
            currentUser.progreso = Math.round((filledCount / 4) * 100);
            
            document.getElementById('progress-val').innerText = `${currentUser.progreso}%`;
            document.getElementById('progress-bar-fill').style.width = `${currentUser.progreso}%`;
            
            // Autocorrección básica
            if (currentUser.progreso === 100) {
                currentUser.calificacion = 'COMPLETADO';
            } else {
                currentUser.calificacion = 'EN PROCESO';
            }
        }

        function saveProgress() {
            const index = db.findIndex(u => u.id === currentUser.id);
            if (index > -1) {
                db[index] = JSON.parse(JSON.stringify(currentUser));
            } else {
                db.push(JSON.parse(JSON.stringify(currentUser)));
            }
            localStorage.setItem('tecno_db_v2', JSON.stringify(db));
            showToast("DATOS SINCRONIZADOS CON EL SERVIDOR");
        }

        function logout() {
            if (confirm("¿Deseas cerrar la sesión? Asegúrate de haber guardado tu progreso.")) {
                saveProgress();
                location.reload();
            }
        }

        // --- ADMIN LOGIC ---
        function showAdminPrompt() {
            document.getElementById('admin-modal').classList.remove('hidden');
        }

        function closeAdminModal() {
            document.getElementById('admin-modal').classList.add('hidden');
        }

        function checkAdmin() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === '1304') {
                closeAdminModal();
                showAdminPanel();
            } else {
                showToast("FRECUENCIA INCORRECTA");
                document.getElementById('admin-pass').value = '';
            }
        }

        function showAdminPanel() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-content').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
            renderAdminData();
        }

        function hideAdmin() {
            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
        }

        function renderAdminData() {
            const container = document.getElementById('admin-data');
            if (db.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20 border-2 border-dashed border-gray-800 rounded-3xl">
                        <p class="text-gray-500 italic">No hay registros de cadetes en la base de datos.</p>
                    </div>`;
                return;
            }

            const cursos = ['2-1', '2-2', '2-3', '2-4'];
            let html = "";

            cursos.forEach(c => {
                const alumnosCurso = db.filter(u => u.curso === c);
                if (alumnosCurso.length > 0) {
                    html += `
                        <div class="glass-card overflow-hidden">
                            <div class="bg-cyan-900/40 p-4 border-b border-cyan-500/30">
                                <h3 class="text-xl neon-text">CURSO: ${c}</h3>
                            </div>
                            <div class="overflow-x-auto">
                                <table class="w-full text-left text-sm">
                                    <thead class="bg-black/50 text-cyan-500 uppercase text-xs tracking-tighter">
                                        <tr>
                                            <th class="p-4">Cadete</th>
                                            <th class="p-4">Turno</th>
                                            <th class="p-4">Progreso</th>
                                            <th class="p-4">Estado / Calificación</th>
                                            <th class="p-4 text-center">Acciones</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-gray-800">
                    `;
                    
                    alumnosCurso.sort((a,b) => a.apellido.localeCompare(b.apellido)).forEach(u => {
                        const statusClass = u.progreso === 100 ? 'text-green-400' : 'text-yellow-500';
                        html += `
                            <tr class="hover:bg-cyan-900/10 transition-colors">
                                <td class="p-4 font-bold text-white">${u.apellido}, ${u.nombre}</td>
                                <td class="p-4 text-gray-400">${u.turno}</td>
                                <td class="p-4">
                                    <div class="flex items-center space-x-2">
                                        <div class="w-16 bg-gray-800 h-1.5 rounded-full overflow-hidden">
                                            <div class="bg-cyan-500 h-full" style="width: ${u.progreso}%"></div>
                                        </div>
                                        <span class="text-xs">${u.progreso}%</span>
                                    </div>
                                </td>
                                <td class="p-4">
                                    <input type="text" value="${u.calificacion}" 
                                        class="bg-transparent border border-gray-700 rounded px-2 py-1 text-xs w-full ${statusClass}" 
                                        onchange="updateGrade(${u.id}, this.value)">
                                </td>
                                <td class="p-4 flex justify-center space-x-2">
                                    <button onclick="viewDetails(${u.id})" class="bg-cyan-900/40 p-2 rounded hover:bg-cyan-500 hover:text-black transition-all">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                            <path d="M10 12a2 2 0 100-4 2 2 0 000 4z" />
                                            <path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd" />
                                        </svg>
                                    </button>
                                    <button onclick="deleteStudent(${u.id})" class="bg-red-900/20 p-2 rounded text-red-500 hover:bg-red-600 hover:text-white transition-all">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                            <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                                        </svg>
                                    </button>
                                </td>
                            </tr>
                        `;
                    });
                    html += `</tbody></table></div></div>`;
                }
            });

            container.innerHTML = html;
        }

        function updateGrade(id, val) {
            const index = db.findIndex(u => u.id === id);
            if (index > -1) {
                db[index].calificacion = val;
                localStorage.setItem('tecno_db_v2', JSON.stringify(db));
            }
        }

        function deleteStudent(id) {
            if (confirm("¿ELIMINAR ESTE REGISTRO PERMANENTEMENTE?")) {
                db = db.filter(u => u.id !== id);
                localStorage.setItem('tecno_db_v2', JSON.stringify(db));
                renderAdminData();
            }
        }

        function viewDetails(id) {
            const u = db.find(user => user.id === id);
            // Formatear texto para mejor lectura
            let report = `REPORTE DE MISIÓN: ${u.apellido.toUpperCase()}, ${u.nombre.toUpperCase()}\n`;
            report += `CURSO: ${u.curso} | TURNO: ${u.turno}\n`;
            report += `-------------------------------------------\n\n`;
            report += `ETAPA 1 (ARQUEOLOGÍA):\n${u.respuestas.e1 || 'Sin respuesta'}\n\n`;
            report += `ETAPA 2 (SISTEMAS):\n${u.respuestas.e2 || 'Sin respuesta'}\n\n`;
            report += `ETAPA 3 (ÉTICA):\n${u.respuestas.e3 || 'Sin respuesta'}\n\n`;
            report += `ETAPA 4 (FINAL):\n${u.respuestas.e4 || 'Sin respuesta'}\n`;
            
            // Usar una ventana de previsualización simple
            const win = window.open("", "Reporte", "width=600,height=600");
            win.document.write(`<pre style="font-family: monospace; background: #000; color: #0f0; padding: 20px;">${report}</pre>`);
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = "fixed bottom-10 left-1/2 -translate-x-1/2 bg-cyan-600 text-white px-6 py-3 rounded-full shadow-2xl z-50 animate-bounce";
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
