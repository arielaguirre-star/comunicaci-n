<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TecnoBot - Evolución de las Comunicaciones</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: #0a0a0c;
            color: #e0e0e0;
            background-image: 
                linear-gradient(rgba(10, 10, 12, 0.9), rgba(10, 10, 12, 0.9)),
                url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(20, 20, 25, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 20px;
            box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.8);
        }

        .neon-text {
            color: #00f2ff;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.6);
            font-family: 'Orbitron', sans-serif;
        }

        .step-active {
            border: 2px solid #00f2ff;
            background: rgba(0, 242, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        .step-locked {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        input, select, textarea {
            background: rgba(0, 0, 0, 0.4) !important;
            border: 1px solid rgba(0, 242, 255, 0.3) !important;
            color: #00f2ff !important;
            transition: all 0.3s;
        }

        input:focus, textarea:focus {
            border-color: #00f2ff !important;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.4);
            outline: none;
        }

        .btn-neon {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Orbitron', sans-serif;
        }

        .btn-neon:hover:not(:disabled) {
            box-shadow: 0 0 25px rgba(0, 198, 255, 0.8);
            transform: scale(1.02);
        }

        .btn-neon:disabled {
            background: #444;
            cursor: not-allowed;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0c; }
        ::-webkit-scrollbar-thumb { background: #00f2ff; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="app" class="max-w-5xl mx-auto">
        <!-- HEADER -->
        <header class="text-center mb-8">
            <h1 class="text-4xl md:text-6xl neon-text mb-2">TECNO-BOT 2.0</h1>
            <p class="text-cyan-500 font-medium tracking-widest uppercase">Misión: Evolución de las Comunicaciones</p>
        </header>

        <!-- PANTALLA DE INGRESO -->
        <div id="login-screen" class="glass-card p-10 max-w-lg mx-auto">
            <div class="text-center mb-8">
                <div class="inline-block p-4 rounded-full bg-cyan-900/30 mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </div>
                <h2 class="text-3xl neon-text">ACCESO CADETE</h2>
            </div>
            
            <div class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="nombre" placeholder="Nombre" class="w-full p-4 rounded-lg">
                    <input type="text" id="apellido" placeholder="Apellido" class="w-full p-4 rounded-lg">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <select id="curso" class="p-4 rounded-lg">
                        <option value="" disabled selected>Curso</option>
                        <option value="2-1">2° 1</option>
                        <option value="2-2">2° 2</option>
                        <option value="2-3">2° 3</option>
                        <option value="2-4">2° 4</option>
                    </select>
                    <select id="turno" class="p-4 rounded-lg">
                        <option value="" disabled selected>Turno</option>
                        <option value="TM">T. Mañana</option>
                        <option value="TT">T. Tarde</option>
                    </select>
                </div>
                <button onclick="startApp()" class="w-full btn-neon p-5 rounded-xl mt-6 text-xl">Iniciar Protocolo</button>
            </div>
            <button onclick="showAdminPrompt()" class="w-full mt-10 text-xs text-gray-500 hover:text-cyan-400 transition-colors">MODO SUPERVISOR (DOCENTE)</button>
        </div>

        <!-- PANTALLA PRINCIPAL DE ETAPAS -->
        <div id="main-content" class="hidden">
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 glass-card p-4 px-8">
                <div id="user-info" class="text-xl text-white font-bold"></div>
                <div class="flex items-center space-x-4">
                    <div class="text-right">
                        <div class="text-xs text-cyan-500 uppercase font-bold">Sincronización</div>
                        <div id="progress-val" class="text-2xl neon-text">0%</div>
                    </div>
                    <div class="w-32 bg-gray-800 rounded-full h-3">
                        <div id="progress-bar-fill" class="bg-cyan-500 h-3 rounded-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <button onclick="showEtapa(1)" id="btn-e1" class="glass-card p-6 text-center transition-all duration-300">
                    <span class="block text-xs text-gray-500 mb-1">FASE 01</span>
                    <span class="font-bold">ARQUEOLOGÍA</span>
                </button>
                <button onclick="showEtapa(2)" id="btn-e2" class="glass-card p-6 text-center transition-all duration-300 step-locked">
                    <span class="block text-xs text-gray-500 mb-1">FASE 02</span>
                    <span class="font-bold">SISTEMAS</span>
                </button>
                <button onclick="showEtapa(3)" id="btn-e3" class="glass-card p-6 text-center transition-all duration-300 step-locked">
                    <span class="block text-xs text-gray-500 mb-1">FASE 03</span>
                    <span class="font-bold">ÉTICA</span>
                </button>
                <button onclick="showEtapa(4)" id="btn-e4" class="glass-card p-6 text-center transition-all duration-300 step-locked">
                    <span class="block text-xs text-gray-500 mb-1">FASE 04</span>
                    <span class="font-bold">RETO FINAL</span>
                </button>
            </div>

            <div id="etapa-content" class="glass-card p-8 min-h-[450px] relative">
                <!-- Dinámico -->
            </div>

            <div class="mt-8 flex flex-col md:flex-row gap-4 justify-between">
                <button onclick="saveProgress(true)" class="bg-cyan-600 hover:bg-cyan-500 px-8 py-3 rounded-xl font-bold transition-colors">GUARDAR AVANCE MANUAL</button>
                <button onclick="logout()" class="text-gray-500 hover:text-white transition-colors underline">Finalizar Sesión</button>
            </div>
        </div>

        <!-- PANEL DOCENTE -->
        <div id="admin-panel" class="hidden glass-card p-8">
            <div class="flex justify-between items-center mb-8 border-b border-cyan-900 pb-4">
                <div>
                    <h2 class="text-3xl neon-text">CENTRO DE CONTROL</h2>
                    <p class="text-gray-400">Monitoreo de Cadetes</p>
                </div>
                <button onclick="hideAdmin()" class="bg-red-900/40 hover:bg-red-700 text-red-200 px-6 py-2 rounded-lg border border-red-500">SALIR</button>
            </div>
            
            <div id="admin-data" class="space-y-8">
                <!-- Dinámico -->
            </div>
        </div>
    </div>

    <!-- MODAL DOCENTE -->
    <div id="admin-modal" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-4 z-50">
        <div class="glass-card p-10 max-w-sm w-full text-center border-2 border-cyan-500">
            <h3 class="text-2xl neon-text mb-6">AUTENTICACIÓN</h3>
            <input type="password" id="admin-pass" class="w-full p-4 mb-6 rounded-lg text-center text-2xl tracking-[1em]" maxlength="4">
            <button onclick="checkAdmin()" class="w-full btn-neon p-4 rounded-xl">VALIDAR</button>
            <button onclick="closeAdminModal()" class="mt-4 text-gray-500">Cerrar</button>
        </div>
    </div>

    <script>
        let currentUser = null;
        let db = JSON.parse(localStorage.getItem('tecno_db_v2')) || [];

        const etapasConfig = {
            1: { title: "ETAPA 1: ARQUEOLOGÍA", desc: "Investiga 4 hitos históricos.", id: 'e1' },
            2: { title: "ETAPA 2: SISTEMAS", desc: "Compara Telégrafo vs WhatsApp.", id: 'e2' },
            3: { title: "ETAPA 3: ÉTICA", desc: "Análisis FODA ambiental.", id: 'e3' },
            4: { title: "ETAPA 4: RETO FINAL", desc: "Sistema sin electricidad.", id: 'e4' }
        };

        function startApp() {
            const nombre = document.getElementById('nombre').value.trim();
            const apellido = document.getElementById('apellido').value.trim();
            const curso = document.getElementById('curso').value;
            const turno = document.getElementById('turno').value;

            if (!nombre || !apellido || !curso || !turno) return alert("Complete los datos");

            // Buscar si ya existe para retomar progreso
            let existing = db.find(u => u.nombre.toLowerCase() === nombre.toLowerCase() && u.apellido.toLowerCase() === apellido.toLowerCase() && u.curso === curso);
            
            if (existing) {
                if (confirm("Ya existe un registro con estos datos. ¿Deseas retomar donde dejaste? (Cancelar borrará lo anterior)")) {
                    currentUser = existing;
                } else {
                    db = db.filter(u => u.id !== existing.id);
                    createProfile(nombre, apellido, curso, turno);
                }
            } else {
                createProfile(nombre, apellido, curso, turno);
            }

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('user-info').innerHTML = `CADETE: ${apellido.toUpperCase()}, ${nombre.toUpperCase()} | ${curso}`;
            showEtapa(1);
            calculateProgress();
        }

        function createProfile(nombre, apellido, curso, turno) {
            currentUser = {
                id: Date.now(),
                nombre, apellido, curso, turno,
                respuestas: { e1: '', e2: '', e3: '', e4: '' },
                calificacion: 'Pendiente',
                progreso: 0
            };
            db.push(currentUser);
            localStorage.setItem('tecno_db_v2', JSON.stringify(db));
        }

        function showEtapa(n) {
            if (n > 1 && (currentUser.respuestas[`e${n-1}`] || "").length < 30) {
                return showToast(`Completa la Fase ${n-1} para avanzar.`);
            }

            const config = etapasConfig[n];
            const container = document.getElementById('etapa-content');
            
            // UI Update
            [1,2,3,4].forEach(i => {
                const btn = document.getElementById(`btn-e${i}`);
                btn.classList.remove('step-active');
                if (i === 1 || (currentUser.respuestas[`e${i-1}`] && currentUser.respuestas[`e${i-1}`].length >= 30)) {
                    btn.classList.remove('step-locked');
                } else { btn.classList.add('step-locked'); }
            });
            document.getElementById(`btn-e${n}`).classList.add('step-active');

            container.innerHTML = `
                <h3 class="text-3xl neon-text mb-2">${config.title}</h3>
                <p class="mb-6 text-gray-400 italic">${config.desc}</p>
                <textarea 
                    id="area-${config.id}" 
                    class="w-full h-64 p-6 rounded-xl font-mono text-sm" 
                    oninput="updateLocalResp('${config.id}', this.value)">${currentUser.respuestas[config.id]}</textarea>
            `;
        }

        function updateLocalResp(key, val) {
            currentUser.respuestas[key] = val;
            calculateProgress();
            saveProgress(false); // Guardado automático silencioso
        }

        function calculateProgress() {
            let filled = 0;
            if (currentUser.respuestas.e1.length >= 30) filled++;
            if (currentUser.respuestas.e2.length >= 30) filled++;
            if (currentUser.respuestas.e3.length >= 30) filled++;
            if (currentUser.respuestas.e4.length >= 30) filled++;
            
            currentUser.progreso = Math.round((filled / 4) * 100);
            document.getElementById('progress-val').innerText = `${currentUser.progreso}%`;
            document.getElementById('progress-bar-fill').style.width = `${currentUser.progreso}%`;
            
            if (currentUser.progreso === 100 && currentUser.calificacion === 'Pendiente') {
                currentUser.calificacion = 'COMPLETADO';
            }
        }

        function saveProgress(showMsg) {
            const idx = db.findIndex(u => u.id === currentUser.id);
            if (idx > -1) {
                db[idx] = JSON.parse(JSON.stringify(currentUser));
                localStorage.setItem('tecno_db_v2', JSON.stringify(db));
                if (showMsg) showToast("AVANCE GUARDADO EN BASE DE DATOS");
            }
        }

        function logout() {
            if (confirm("¿Finalizar?")) {
                saveProgress(false);
                location.reload();
            }
        }

        // ADMIN
        function showAdminPrompt() { document.getElementById('admin-modal').classList.remove('hidden'); }
        function closeAdminModal() { document.getElementById('admin-modal').classList.add('hidden'); }
        
        function checkAdmin() {
            if (document.getElementById('admin-pass').value === '1304') {
                closeAdminModal();
                showAdminPanel();
            } else {
                alert("Error");
                document.getElementById('admin-pass').value = '';
            }
        }

        function showAdminPanel() {
            // Recargar DB para ver cambios de otros usuarios
            db = JSON.parse(localStorage.getItem('tecno_db_v2')) || [];
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-content').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
            renderAdminData();
        }

        function hideAdmin() {
            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
        }

        function renderAdminData() {
            const container = document.getElementById('admin-data');
            const cursos = ['2-1', '2-2', '2-3', '2-4'];
            let html = "";

            cursos.forEach(c => {
                const alumnos = db.filter(u => u.curso === c);
                if (alumnos.length > 0) {
                    html += `
                        <div class="glass-card p-4">
                            <h3 class="text-xl neon-text mb-4">CURSO: ${c}</h3>
                            <table class="w-full text-sm">
                                <thead class="text-cyan-500 border-b border-gray-800">
                                    <tr>
                                        <th class="p-2 text-left">Alumno</th>
                                        <th class="p-2">Progreso</th>
                                        <th class="p-2">Nota</th>
                                        <th class="p-2 text-right">Ver</th>
                                    </tr>
                                </thead>
                                <tbody>
                    `;
                    alumnos.sort((a,b) => a.apellido.localeCompare(b.apellido)).forEach(u => {
                        html += `
                            <tr class="border-b border-gray-900">
                                <td class="p-2 font-bold">${u.apellido}, ${u.nombre}</td>
                                <td class="p-2 text-center">${u.progreso}%</td>
                                <td class="p-2 text-center">
                                    <input type="text" class="w-16 text-center bg-black" value="${u.calificacion}" 
                                           onchange="updateGrade(${u.id}, this.value)">
                                </td>
                                <td class="p-2 text-right">
                                    <button onclick="viewDetails(${u.id})" class="text-cyan-400">📄</button>
                                </td>
                            </tr>
                        `;
                    });
                    html += `</tbody></table></div>`;
                }
            });
            container.innerHTML = html || "<p class='text-center'>Sin datos</p>";
        }

        function updateGrade(id, val) {
            const idx = db.findIndex(u => u.id === id);
            if (idx > -1) {
                db[idx].calificacion = val;
                localStorage.setItem('tecno_db_v2', JSON.stringify(db));
                showToast("Nota actualizada");
            }
        }

        function viewDetails(id) {
            const u = db.find(user => user.id === id);
            const win = window.open("", "Reporte", "width=500,height=600");
            win.document.write(`
                <body style="background:#111;color:#0f0;font-family:monospace;padding:20px;">
                    <h2>CADETE: ${u.apellido}, ${u.nombre}</h2>
                    <p>CURSO: ${u.curso} | TURNO: ${u.turno}</p>
                    <hr>
                    <p><b>ETAPA 1:</b><br>${u.respuestas.e1}</p>
                    <p><b>ETAPA 2:</b><br>${u.respuestas.e2}</p>
                    <p><b>ETAPA 3:</b><br>${u.respuestas.e3}</p>
                    <p><b>ETAPA 4:</b><br>${u.respuestas.e4}</p>
                </body>
            `);
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = "fixed bottom-5 left-1/2 -translate-x-1/2 bg-cyan-700 px-6 py-2 rounded-full text-xs z-50";
            t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }
    </script>
</body>
</html>
